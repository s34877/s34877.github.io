<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แฟ้มสะสมงานของพรนภา</title>
    <style>
        body { font-family: sans-serif; background-color: #E6E6FA; text-align: center; padding: 30px; }
        .container { max-width: 800px; margin: 0 auto; }
        .project-card { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: left; }
        .btn { display: inline-block; background: #2c3e50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>📁 แฟ้มสะสมงานของพรนภา</h1>
        <img src="m-picture.jpg" alt="รูปโปรไฟล์ของฉัน" width="200">
        <p>นี่คือพื้นที่รวบรวมผลงานและกิจกรรมที่ภูมิใจค่ะ</p>

        <div class="project-card">
            <h3>1. ผลงานด้านการวาดรูป</h3>
            <p>รายละเอียดชิ้นงาน: เขียนอธิบายสั้นๆ เกี่ยวกับผลงานศิลปะที่สร้างสรรค์ขึ้น</p>
        </div>

        <div class="project-card">
            <h3>2. กิจกรรม/เกียรติบัตรด้านการร้องเพลง</h3>
            <p>รายละเอียดชิ้นงาน: ข้อมูลการประกวดร้องเพลง หรือกิจกรรมทางดนตรีที่เคยเข้าร่วม</p>
        </div>

        <a href="index.html" class="btn">🏠 กลับหน้าแรก</a>
    </div>

</body>
</html>
